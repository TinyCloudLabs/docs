<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 597.4879999999999 520" width="597.4879999999999" height="520" style="--bg:#FFFFFF;--fg:#27272A;--accent:#2563EB;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="App" x1="74.7625" y1="70" x2="74.7625" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="SDK" x1="218.36649999999997" y1="70" x2="218.36649999999997" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Widget" x1="382.34799999999996" y1="70" x2="382.34799999999996" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="User" x1="527.4879999999999" y1="70" x2="527.4879999999999" y2="490" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="App" data-to="SDK" data-label="openkey.connect()" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="74.7625" y1="90" x2="218.36649999999997" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="146.56449999999998" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">openkey.connect()</text>
</g>
<g class="message" data-from="SDK" data-to="Widget" data-label="Open popup/iframe" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="218.36649999999997" y1="130" x2="382.34799999999996" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="300.35724999999996" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Open popup/iframe</text>
</g>
<g class="message" data-from="Widget" data-to="SDK" data-label="openkey:ready" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="382.34799999999996" y1="170" x2="218.36649999999997" y2="170" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="300.35724999999996" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">openkey:ready</text>
</g>
<g class="message" data-from="SDK" data-to="Widget" data-label="openkey:auth:request" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="218.36649999999997" y1="210" x2="382.34799999999996" y2="210" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="300.35724999999996" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">openkey:auth:request</text>
</g>
<g class="message" data-from="Widget" data-to="User" data-label="Show sign-in (if needed)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="382.34799999999996" y1="250" x2="527.4879999999999" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="454.91799999999995" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Show sign-in (if needed)</text>
</g>
<g class="message" data-from="User" data-to="Widget" data-label="Authenticate with passkey" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="527.4879999999999" y1="290" x2="382.34799999999996" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="454.91799999999995" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Authenticate with passkey</text>
</g>
<g class="message" data-from="Widget" data-to="User" data-label="Show key selection" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="382.34799999999996" y1="330" x2="527.4879999999999" y2="330" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="454.91799999999995" y="320" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Show key selection</text>
</g>
<g class="message" data-from="User" data-to="Widget" data-label="Select a key" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="527.4879999999999" y1="370" x2="382.34799999999996" y2="370" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="454.91799999999995" y="360" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Select a key</text>
</g>
<g class="message" data-from="Widget" data-to="SDK" data-label="openkey:auth:response" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="382.34799999999996" y1="410" x2="218.36649999999997" y2="410" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="300.35724999999996" y="400" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">openkey:auth:response</text>
</g>
<g class="message" data-from="SDK" data-to="App" data-label="{ address, keyId }" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="218.36649999999997" y1="450" x2="74.7625" y2="450" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="146.56449999999998" y="440" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">{ address, keyId }</text>
</g>
<g class="actor" data-id="App" data-label="Your App" data-type="participant">
  <rect x="30" y="30" width="89.525" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="74.7625" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Your App</text>
</g>
<g class="actor" data-id="SDK" data-label="OpenKey SDK" data-type="participant">
  <rect x="159.52499999999998" y="30" width="117.68299999999998" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="218.36649999999997" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">OpenKey SDK</text>
</g>
<g class="actor" data-id="Widget" data-label="OpenKey Widget" data-type="participant">
  <rect x="317.20799999999997" y="30" width="130.28" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="382.34799999999996" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">OpenKey Widget</text>
</g>
<g class="actor" data-id="User" data-label="User" data-type="participant">
  <rect x="487.48799999999994" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="527.4879999999999" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">User</text>
</g>
</svg>