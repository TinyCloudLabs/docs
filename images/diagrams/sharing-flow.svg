  <rect x="349.812" y="30" width="128.057" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="413.8405" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">TinyCloud Node</text>
</g>
<g class="actor" data-id="Bob" data-label="Bob (Recipient)" data-type="participant">
