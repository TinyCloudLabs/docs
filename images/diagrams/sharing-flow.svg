  <text x="168.0535" y="330" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">tc1:eyJ2ZXJz...</text>
</g>
<g class="message" data-from="Alice" data-to="Bob" data-label="Send link (email, chat, etc.)" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="88.10050000000001" y1="380" x2="578.9335" y2="380" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="333.517" y="370" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Send link (email, chat, etc.)</text>
</g>
<g class="message" data-from="Bob" data-to="SDK" data-label="receiveShare('tc1:...')" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="578.9335" y1="420" x2="248.00650000000002" y2="420" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="413.47" y="410" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">receiveShare(&#39;tc1:...&#39;)</text>
</g>
<g class="message" data-from="SDK" data-to="SDK" data-label="Decode payload" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="248.00650000000002,460 278.0065,460 278.0065,480 248.00650000000002,480" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="286.0065" y="470" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Decode payload</text>
</g>
<g class="message" data-from="SDK" data-to="Node" data-label="Request data with delegation + ephemeral key" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="248.00650000000002" y1="530" x2="413.8405" y2="530" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="330.9235" y="520" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Request data with delegation + ephemeral key</text>
</g>
<g class="message" data-from="Node" data-to="Node" data-label="Validate delegation chain" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="413.8405,570 443.8405,570 443.8405,590 413.8405,590" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="451.8405" y="580" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Validate delegation chain</text>
</g>
<g class="message" data-from="Node" data-to="SDK" data-label="Return shared data" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="413.8405" y1="640" x2="248.00650000000002" y2="640" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="330.9235" y="630" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Return shared data</text>
</g>
<g class="message" data-from="SDK" data-to="Bob" data-label="{ data, path, spaceId }" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="248.00650000000002" y1="680" x2="578.9335" y2="680" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="413.47" y="670" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">{ data, path, spaceId }</text>
</g>
<g class="actor" data-id="Alice" data-label="Alice (Sharer)" data-type="participant">
  <rect x="30.000000000000007" y="30" width="116.20100000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="88.10050000000001" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Alice (Sharer)</text>
</g>
<g class="actor" data-id="SDK" data-label="TinyCloud SDK" data-type="participant">
  <rect x="186.20100000000002" y="30" width="123.61099999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="248.00650000000002" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">TinyCloud SDK</text>
</g>
