<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 458.74749999999995 400" width="458.74749999999995" height="400" style="--bg:#FFFFFF;--fg:#27272A;--accent:#2563EB;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="User" x1="70" y1="70" x2="70" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="App" x1="210" y1="70" x2="210" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="OpenKey" x1="361.755" y1="70" x2="361.755" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="App" data-to="OpenKey" data-label="Authorization request (PKCE)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="90" x2="361.755" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="285.8775" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Authorization request (PKCE)</text>
</g>
<g class="message" data-from="OpenKey" data-to="User" data-label="Login + consent screen" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="361.755" y1="130" x2="70" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="215.8775" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Login + consent screen</text>
</g>
<g class="message" data-from="User" data-to="OpenKey" data-label="Approve" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="170" x2="361.755" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="215.8775" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Approve</text>
</g>
<g class="message" data-from="OpenKey" data-to="App" data-label="Authorization code" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="361.755" y1="210" x2="210" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="285.8775" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Authorization code</text>
</g>
<g class="message" data-from="App" data-to="OpenKey" data-label="Exchange code for tokens" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="250" x2="361.755" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="285.8775" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Exchange code for tokens</text>
</g>
<g class="message" data-from="OpenKey" data-to="App" data-label="access_token, id_token" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="361.755" y1="290" x2="210" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="285.8775" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">access_token, id_token</text>
</g>
<g class="message" data-from="App" data-to="OpenKey" data-label="API calls with access_token" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="330" x2="361.755" y2="330" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="285.8775" y="320" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">API calls with access_token</text>
</g>
<g class="actor" data-id="User" data-label="User" data-type="participant">
  <rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="70" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">User</text>
</g>
<g class="actor" data-id="App" data-label="Your App" data-type="participant">
  <rect x="165.2375" y="30" width="89.525" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="210" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Your App</text>
</g>
<g class="actor" data-id="OpenKey" data-label="OpenKey (OAuth)" data-type="participant">
  <rect x="294.76250000000005" y="30" width="133.98499999999996" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="361.755" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">OpenKey (OAuth)</text>
</g>
</svg>