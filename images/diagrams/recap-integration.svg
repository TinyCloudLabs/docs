<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 637.4975 540" width="637.4975" height="540" style="--bg:#FFFFFF;--fg:#27272A;--accent:#2563EB;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="User" x1="80.32000000000001" y1="70" x2="80.32000000000001" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="SDK" x1="232.44549999999998" y1="70" x2="232.44549999999998" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Node" x1="398.2795" y1="70" x2="398.2795" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="User" data-to="SDK" data-label="Connect wallet" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="80.32000000000001" y1="90" x2="232.44549999999998" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="156.38275" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Connect wallet</text>
</g>
<g class="message" data-from="SDK" data-to="Node" data-label="Request nonce" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="232.44549999999998" y1="130" x2="398.2795" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="315.36249999999995" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Request nonce</text>
</g>
<g class="message" data-from="Node" data-to="SDK" data-label="Nonce + session params" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="398.2795" y1="170" x2="232.44549999999998" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="315.36249999999995" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Nonce + session params</text>
</g>
<g class="message" data-from="SDK" data-to="SDK" data-label="Build SIWE message with ReCap capabilities" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="232.44549999999998,210 262.4455,210 262.4455,230 232.44549999999998,230" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="270.4455" y="220" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Build SIWE message with ReCap capabilities</text>
</g>
<g class="message" data-from="SDK" data-to="User" data-label="Request signature" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="232.44549999999998" y1="280" x2="80.32000000000001" y2="280" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="156.38275" y="270" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Request signature</text>
</g>
<g class="message" data-from="User" data-to="SDK" data-label="Signed SIWE message" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="80.32000000000001" y1="320" x2="232.44549999999998" y2="320" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="156.38275" y="310" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Signed SIWE message</text>
</g>
<g class="message" data-from="SDK" data-to="Node" data-label="Submit signature + capabilities" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="232.44549999999998" y1="360" x2="398.2795" y2="360" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="315.36249999999995" y="350" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Submit signature + capabilities</text>
</g>
<g class="message" data-from="Node" data-to="Node" data-label="Verify signature &amp; capability claims" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="398.2795,400 428.2795,400 428.2795,420 398.2795,420" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="436.2795" y="410" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Verify signature &amp; capability claims</text>
</g>
<g class="message" data-from="Node" data-to="SDK" data-label="Session token with authorized capabilities" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="398.2795" y1="470" x2="232.44549999999998" y2="470" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="315.36249999999995" y="460" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Session token with authorized capabilities</text>
</g>
<g class="actor" data-id="User" data-label="User Wallet" data-type="participant">
  <rect x="30" y="30" width="100.64000000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="80.32000000000001" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">User Wallet</text>
</g>
<g class="actor" data-id="SDK" data-label="TinyCloud SDK" data-type="participant">
  <rect x="170.64" y="30" width="123.61099999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="232.44549999999998" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">TinyCloud SDK</text>
</g>
<g class="actor" data-id="Node" data-label="TinyCloud Node" data-type="participant">
  <rect x="334.251" y="30" width="128.057" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="398.2795" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">TinyCloud Node</text>
</g>
</svg>