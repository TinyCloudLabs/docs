  <rect x="224.05700000000002" y="72.3805" width="176.81199999999998" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="312.463" y="99.2805" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="312.463" dy="-3.9000000000000012">Check delegatee</tspan><tspan x="312.463" dy="16.900000000000002">matches next delegator</tspan></text>
</g>
<g class="node" data-id="C" data-label="Verify action
is subset" data-shape="rectangle">
  <rect x="448.869" y="72.3805" width="115.30900000000001" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="506.5235" y="99.2805" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="506.5235" dy="-3.9000000000000012">Verify action</tspan><tspan x="506.5235" dy="16.900000000000002">is subset</tspan></text>
</g>
<g class="node" data-id="D" data-label="Verify path
