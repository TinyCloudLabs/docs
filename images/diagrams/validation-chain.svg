  <rect x="612.178" y="72.3805" width="126.42399999999999" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="675.39" y="99.2805" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="675.39" dy="-3.9000000000000012">Verify path</tspan><tspan x="675.39" dy="16.900000000000002">is within scope</tspan></text>
</g>
<g class="node" data-id="E" data-label="Verify expiry
and not_before" data-shape="rectangle">
  <rect x="786.602" y="72.3805" width="130.12900000000002" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="851.6665" y="99.2805" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="851.6665" dy="-3.9000000000000012">Verify expiry</tspan><tspan x="851.6665" dy="16.900000000000002">and not_before</tspan></text>
</g>
<g class="node" data-id="F" data-label="Check revocation
status" data-shape="rectangle">
  <rect x="964.731" y="72.3805" width="146.43099999999998" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1037.9465" y="99.2805" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="1037.9465" dy="-3.9000000000000012">Check revocation</tspan><tspan x="1037.9465" dy="16.900000000000002">status</tspan></text>
</g>
<g class="node" data-id="G" data-label="All valid?" data-shape="diamond">
  <polygon points="1218.4425,40 1277.7230000000002,99.2805 1218.4425,158.561 1159.162,99.2805" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1218.4425" y="99.2805" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">All valid?</text>
</g>
<g class="node" data-id="H" data-label="Allow request" data-shape="rectangle">
  <rect x="1399.411" y="48.380500000000005" width="121.23700000000001" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1460.0295" y="66.8305" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Allow request</text>
</g>
<g class="node" data-id="I" data-label="Reject request" data-shape="rectangle">
  <rect x="1399.411" y="113.28050000000002" width="127.16499999999999" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1462.9935" y="131.7305" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Reject request</text>
</g>
</svg>